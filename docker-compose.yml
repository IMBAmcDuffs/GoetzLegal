services:
  db:
    image: mariadb:11.4.10@sha256:3b4dfcc32247eb07adbebec0793afae2a8eafa6860ec523ee56af4d3dec42f7f
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MARIADB_USER: ${MYSQL_USER:-wordpress}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wordpress}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: ${WORDPRESS_IMAGE:-wordpress:6.9.4-php8.3-apache@sha256:5d2c212561c4b5442ebc4d98933a9cbadcf3dee8888ed3fd9ed44667c27cc905}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_CONFIG_EXTRA: |
        if ( ! defined( 'WP_DEBUG' ) ) {
          define( 'WP_DEBUG', true );
        }
        if ( ! defined( 'WP_DEBUG_LOG' ) ) {
          define( 'WP_DEBUG_LOG', true );
        }
        if ( ! defined( 'WP_ENVIRONMENT_TYPE' ) ) {
          define( 'WP_ENVIRONMENT_TYPE', 'local' );
        }
        if ( ! defined( 'DISALLOW_FILE_EDIT' ) ) {
          define( 'DISALLOW_FILE_EDIT', true );
        }
      GOETZ_MIGRATION_FETCH_PROXY_URL: ${FETCH_PROXY_URL:-}
    volumes:
      - ./docker/apache/goetz-local.conf:/etc/apache2/conf-enabled/goetz-local.conf:ro
      - wordpress_core:/var/www/html
      - ./wp-content:/var/www/html/wp-content

  wpcli:
    image: ${WPCLI_IMAGE:-wordpress:cli-2.12.0-php8.3@sha256:f8aeb68164c6a04f5dcc91da30d8ffa096b0f7fafb7a65f144c2dd62587caca0}
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      GOETZ_MIGRATION_FETCH_PROXY_URL: ${FETCH_PROXY_URL:-}
      HOME: /tmp
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
    volumes:
      - wordpress_core:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./tests:/app/tests:ro
    working_dir: /var/www/html
    entrypoint: ["sleep", "infinity"]

  node:
    image: node:22.14.0-bookworm@sha256:e5ddf893cc6aeab0e5126e4edae35aa43893e2836d1d246140167ccc2616f5d7
    user: "1000:1000"
    read_only: true
    environment:
      HOME: /tmp/node-home
      npm_config_cache: /tmp/node-cache
    volumes:
      - ./wp-content/themes/goetz-legal:/work/theme
      - ./wp-content/plugins/goetz-site:/work/site
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m,uid=1000,gid=1000
    working_dir: /work/theme
    command: ["sleep", "infinity"]

  composer:
    image: composer:2.8.12@sha256:5248900ab8b5f7f880c2d62180e40960cd87f60149ec9a1abfd62ac72a02577c
    user: "1000:1000"
    read_only: true
    environment:
      HOME: /tmp/composer-home
      COMPOSER_HOME: /tmp/composer-home
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /work
    volumes:
      - ./composer.json:/work/composer.json:ro
      - ./composer.lock:/work/composer.lock:ro
      - ./phpunit.xml.dist:/work/phpunit.xml.dist:ro
      - ./vendor:/work/vendor
      - ./tests/phpunit:/work/tests/phpunit:ro
      - ./wp-content/plugins:/work/wp-content/plugins
      - ./wp-content/themes/goetz-legal:/work/wp-content/themes/goetz-legal
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m,uid=1000,gid=1000
    working_dir: /work
    command: ["sleep", "infinity"]

  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    init: true
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "1gb"
    environment:
      HOME: /tmp/playwright-home
      npm_config_cache: /tmp/playwright-cache
      GOETZ_ARTIFACT_DIR: /work/artifacts
    volumes:
      - ./tests/e2e:/work/e2e:ro
      - ./__dev/playwright/public-node-modules:/work/e2e/node_modules
      - ./artifacts/playwright/public:/work/artifacts
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g,uid=1000,gid=1000
    working_dir: /work/e2e

  playwright-local:
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    init: true
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "1gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOME: /tmp/playwright-home
      npm_config_cache: /tmp/playwright-cache
      GOETZ_COMPOSE_HOST_GATEWAY: "1"
      GOETZ_ARTIFACT_DIR: /work/artifacts
    volumes:
      - ./tests/e2e:/work/e2e:ro
      - ./__dev/playwright/public-node-modules:/work/e2e/node_modules
      - ./artifacts/playwright/public:/work/artifacts
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g,uid=1000,gid=1000
    working_dir: /work/e2e

  playwright-auth:
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    init: true
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "1gb"
    environment:
      HOME: /tmp/playwright-home
      npm_config_cache: /tmp/playwright-cache
      GOETZ_AUTH_STATE_PATH: /work/state/auth-state.json
      GOETZ_ARTIFACT_DIR: /work/artifacts
    volumes:
      - ./tests/e2e:/work/e2e:ro
      - ./__dev/playwright/auth-node-modules:/work/e2e/node_modules
      - ./__dev/playwright/auth-state:/work/state
      - ./artifacts/playwright/auth:/work/artifacts
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g,uid=1000,gid=1000
    working_dir: /work/e2e

  playwright-auth-local:
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    init: true
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "1gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOME: /tmp/playwright-home
      npm_config_cache: /tmp/playwright-cache
      GOETZ_COMPOSE_HOST_GATEWAY: "1"
      GOETZ_AUTH_STATE_PATH: /work/state/auth-state.json
      GOETZ_ARTIFACT_DIR: /work/artifacts
    volumes:
      - ./tests/e2e:/work/e2e:ro
      - ./__dev/playwright/auth-node-modules:/work/e2e/node_modules
      - ./__dev/playwright/auth-state:/work/state
      - ./artifacts/playwright/auth:/work/artifacts
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g,uid=1000,gid=1000
    working_dir: /work/e2e

  playwright-capture:
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    init: true
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "1gb"
    environment:
      HOME: /tmp/playwright-home
      npm_config_cache: /tmp/playwright-cache
      GOETZ_ARTIFACT_DIR: /work/artifacts
      GOETZ_CAPTURE_OUTPUT_DIR: /work/fixtures
    volumes:
      - ./tests/e2e:/work/e2e:ro
      - ./__dev/playwright/capture-node-modules:/work/e2e/node_modules
      - ./artifacts/playwright/capture:/work/artifacts
      - ./tests/visual/fixtures/legacy:/work/fixtures
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=1g,uid=1000,gid=1000
    working_dir: /work/e2e

  playwright-installer:
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    init: true
    user: "0:0"
    volumes:
      - ./tests/e2e:/work/e2e:ro
      - ./__dev/playwright/public-node-modules:/work/e2e/node_modules:ro
    working_dir: /work/e2e

volumes:
  db_data:
  wordpress_core:
